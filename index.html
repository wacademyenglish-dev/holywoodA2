<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WOLF LABS | The Hollywood Fixer (A2)</title>
    
    <!-- Fonts: Playfair Display (Glamour), Inter (Clean UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgBase: '#050505',       /* Onyx Black */
                        panelDark: '#111111',    /* Charcoal */
                        panelHover: '#222222',   /* Dark Grey */
                        textMain: '#FDFCF0',     /* Pearl White */
                        textMuted: '#888888',    /* Silver */
                        accentGold: '#D4AF37',   /* Hollywood Gold */
                        accentRed: '#E50914',    /* Carpet Red */
                        accentGreen: '#10B981'   /* Success Green */
                    },
                    fontFamily: {
                        epic: ['"Playfair Display"', 'serif'],
                        ui: ['"Inter"', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #050505; color: #FDFCF0; overflow: hidden; font-family: 'Inter', sans-serif; 
            transition: background-color 1s ease; 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.03) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(229, 9, 20, 0.03) 0%, transparent 20%);
        }
        
        /* Immersive Shift Class (Crisis Mode) */
        body.immersive-shift { background-color: #1A0505; }
        body.immersive-shift .ws-panel { border-color: rgba(229, 9, 20, 0.3); box-shadow: 0 10px 40px rgba(229, 9, 20, 0.1); }
        
        .ws-panel { background: #111111; border: 1px solid #333333; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333333; border-radius: 10px; }

        @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
        .fade-out { animation: fadeOut 0.8s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes damageShake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-15px); } 40%, 80% { transform: translateX(15px); } }
        .damage-shake { animation: damageShake 0.4s ease-in-out; }
        @keyframes slideDown { 0% { transform: translateY(-100%); opacity: 0; } 10%, 90% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100%); opacity: 0; } }
        .praise-slide { animation: slideDown 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        /* Agent Drawer */
        .teacher-drawer { position: fixed; top: 0; right: -400px; width: 400px; height: 100vh; background: #0A0A0A; z-index: 200; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid #D4AF37; box-shadow: -10px 0 40px rgba(0,0,0,0.9); }
        .teacher-drawer.open { right: 0; }

        /* Levers */
        .lever-track { width: 140px; height: 48px; background: #050505; border-radius: 24px; position: relative; cursor: pointer; border: 2px solid #333333; }
        .lever-thumb { width: 56px; height: 40px; background: #888888; border-radius: 20px; position: absolute; top: 2px; left: 4px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .lever-track.toggled .lever-thumb { left: 76px; background: #D4AF37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }

        .progress-bar-fill { transition: width 0.3s ease; }
        .glow-gold { text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }

        /* Custom VIP Button */
        .btn-vip { background: transparent; color: #D4AF37; border: 1px solid #D4AF37; font-family: 'Inter', sans-serif; text-transform: uppercase; font-size: 1.1rem; letter-spacing: 0.15em; font-weight: 600; transition: all 0.3s ease; cursor: pointer;}
        .btn-vip:hover { background: #D4AF37; color: #050505; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        
        /* Chat UI */
        .chat-bubble-left { background: #222222; color: #FDFCF0; border-radius: 20px 20px 20px 4px; padding: 12px 20px; max-width: 80%; width: fit-content; font-family: 'Inter'; }
        .chat-bubble-right { background: #D4AF37; color: #050505; border-radius: 20px 20px 4px 20px; padding: 12px 20px; max-width: 80%; width: fit-content; align-self: flex-end; font-family: 'Inter'; font-weight: 600; }
        
        /* Redactor UI */
        .redact-target { color: #E50914; border-bottom: 2px dashed #E50914; cursor: pointer; padding: 0 4px; transition: all 0.2s; font-weight: bold; position: relative; }
        .redact-target:hover { background: rgba(229, 9, 20, 0.1); }
        .redact-target.solved { color: #D4AF37; border-bottom: 2px solid #D4AF37; pointer-events: none; background: transparent; }
        
        /* Floating Pronoun Menu */
        #pronoun-menu { position: absolute; z-index: 50; background: #111; border: 1px solid #D4AF37; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.9); display: none; padding: 8px; gap: 8px; grid-template-columns: repeat(3, 1fr); }
        .pronoun-btn { background: #222; color: #FDFCF0; padding: 8px 16px; border-radius: 4px; font-weight: 600; transition: all 0.2s; border: 1px solid transparent; cursor: pointer;}
        .pronoun-btn:hover { background: #D4AF37; color: #000; }
    </style>
</head>
<body class="flex flex-col h-screen select-none relative">
    
    <div id="loading-screen" class="fixed inset-0 z-[1000] bg-bgBase flex flex-col items-center justify-center">
        <div class="text-accentGold text-6xl mb-6 animate-pulse glow-gold"><i class="fa-solid fa-star"></i></div>
        <h1 class="font-epic text-5xl md:text-7xl text-textMain tracking-[0.2em] mb-4 uppercase">THE HOLLYWOOD FIXER</h1>
        <p class="font-ui text-textMuted tracking-widest mb-12 font-bold uppercase text-sm border-b border-[#333] pb-2">VIP Talent Agency (A2)</p>
        <button onclick="initializeSystem()" class="btn-vip px-12 py-4 rounded-full">ENTER THE AGENCY</button>
    </div>

    <div id="damage-overlay" class="fixed inset-0 z-[800] bg-accentRed/10 border-8 border-accentRed/40 opacity-0 pointer-events-none transition-opacity duration-100 flex items-center justify-center">
        <i class="fa-solid fa-camera-retro text-9xl text-accentRed opacity-30 animate-ping"></i>
    </div>

    <div id="praise-overlay" class="fixed top-0 left-0 w-full z-[900] flex justify-center pointer-events-none transform -translate-y-full">
        <div id="praise-card" class="mt-8 bg-accentGold text-bgBase px-16 py-6 rounded-b-[2rem] shadow-[0_20px_50px_rgba(212,175,55,0.3)] border-2 border-t-0 border-[#FFF] text-center">
            <h2 id="praise-text" class="font-epic text-4xl md:text-5xl font-black uppercase tracking-widest mb-2">BRILLIANT!</h2>
            <p id="praise-sub" class="font-ui text-sm font-bold tracking-[0.3em] uppercase">Crisis Averted</p>
        </div>
    </div>

    <div id="teacher-panel" class="teacher-drawer p-8 flex flex-col">
        <div class="flex justify-between items-center mb-8 border-b border-[#333] pb-4">
            <h2 class="font-epic text-3xl text-accentGold tracking-widest uppercase"><i class="fa-solid fa-user-secret mr-3"></i> The Director</h2>
            <button onclick="toggleTeacherPanel()" class="text-textMuted hover:text-accentGold transition-colors"><i class="fa-solid fa-xmark text-3xl"></i></button>
        </div>
        <textarea id="teacher-notes" class="flex-1 bg-[#111] border border-[#333] p-5 font-ui text-lg text-textMain focus:outline-none focus:border-accentGold resize-none mb-8 rounded-xl leading-relaxed" placeholder="> Log agent performance, grammar notes, and PR strategies here..."></textarea>
        <div class="space-y-4">
            <p class="font-ui text-xs text-textMuted tracking-[0.3em] uppercase text-center font-bold">Approve Action</p>
            <button onclick="triggerPraise('FLAWLESS PR!', 'Perfect Grammar')" class="w-full py-4 bg-transparent border border-accentGreen text-accentGreen hover:bg-accentGreen hover:text-bgBase transition-all font-ui font-bold text-sm tracking-widest uppercase rounded-lg">Approve Grammar</button>
            <button onclick="triggerPraise('STAR POWER!', 'Amazing Vocab')" class="w-full py-4 bg-transparent border border-accentGold text-accentGold hover:bg-accentGold hover:text-bgBase transition-all font-ui font-bold text-sm tracking-widest uppercase rounded-lg">Approve Vocab</button>
        </div>
    </div>

    <header class="h-24 bg-[#0A0A0A] border-b border-[#222] z-100 flex items-center justify-between px-8 shrink-0 relative z-40">
        <div class="flex items-center gap-8">
            <div id="health-bar" class="flex gap-3 text-xl text-accentRed">
                <i class="fa-solid fa-shield-halved" id="hp-1"></i><i class="fa-solid fa-shield-halved" id="hp-2"></i><i class="fa-solid fa-shield-halved" id="hp-3"></i>
            </div>
            <div class="flex flex-col border-l border-[#333] pl-6">
                <span class="font-ui text-[9px] text-textMuted uppercase tracking-[0.3em] font-bold">Agency Status</span>
                <span id="xp-counter" class="font-epic text-2xl text-accentGold tracking-widest leading-none glow-gold">0000</span>
            </div>
        </div>
        <div class="absolute left-1/2 -translate-x-1/2 text-center bg-[#111] px-10 py-3 border border-[#333] rounded-b-2xl border-t-0 shadow-lg">
            <p id="hud-name" class="font-epic text-2xl text-textMain tracking-[0.2em] uppercase">GUEST_AGENT</p>
            <p class="font-ui text-[9px] text-accentGold tracking-[0.2em] uppercase mt-1 font-bold">Senior Fixer (A2)</p>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleFullScreen()" class="w-12 h-12 border border-[#333] bg-[#111] flex items-center justify-center rounded-full text-textMuted hover:border-accentGold hover:text-accentGold transition-colors"><i class="fa-solid fa-expand text-lg" id="fs-icon"></i></button>
            <button onclick="toggleTeacherPanel()" class="font-ui text-xs font-bold text-bgBase bg-accentGold tracking-widest uppercase px-6 py-3 rounded-full hover:shadow-[0_0_15px_rgba(212,175,55,0.4)] transition-all"><i class="fa-solid fa-mobile-screen mr-2"></i> Director</button>
        </div>
    </header>

    <main id="arena" class="flex-1 relative overflow-y-auto overflow-x-hidden flex items-center justify-center p-4 md:p-8">
        <div id="step-container" class="w-full max-w-5xl transition-all duration-300 relative z-10 h-full flex flex-col justify-center pb-20"></div>
        <!-- Pronoun Menu Modal (Injected globally for Redactor Mechanic) -->
        <div id="pronoun-menu">
            <button class="pronoun-btn" onclick="selectRedact('me')">me</button>
            <button class="pronoun-btn" onclick="selectRedact('you')">you</button>
            <button class="pronoun-btn" onclick="selectRedact('him')">him</button>
            <button class="pronoun-btn" onclick="selectRedact('her')">her</button>
            <button class="pronoun-btn" onclick="selectRedact('it')">it</button>
            <button class="pronoun-btn" onclick="selectRedact('us')">us</button>
            <button class="pronoun-btn" onclick="selectRedact('them')">them</button>
            <button class="col-span-3 mt-2 py-1 text-xs text-textMuted hover:text-white border border-[#333] rounded" onclick="closeRedact()">Cancel</button>
        </div>
    </main>

    <footer class="h-20 bg-[#0A0A0A] border-t border-[#222] z-100 flex items-center justify-between px-8 shrink-0 relative z-40">
        <div class="w-1/3">
            <div class="w-full bg-[#111] h-1.5 rounded-full overflow-hidden border border-[#333]">
                <div id="progress-fill" class="h-full bg-accentGold transition-all duration-500 shadow-[0_0_10px_rgba(212,175,55,0.8)]" style="width: 4%"></div>
            </div>
        </div>
        <div class="w-1/3 text-center">
            <span id="page-counter" class="font-ui font-bold text-textMuted text-xs tracking-[0.4em] uppercase">PAGE 01 / 25</span>
        </div>
        <div class="w-1/3 flex justify-end gap-6">
            <button id="btn-prev" onclick="nav(-1)" class="w-10 h-10 flex items-center justify-center text-textMuted border border-[#333] rounded-full hover:border-accentGold hover:text-accentGold disabled:opacity-20 transition-all"><i class="fa-solid fa-chevron-left text-sm"></i></button>
            <button id="btn-next" onclick="nav(1)" class="w-10 h-10 flex items-center justify-center text-bgBase bg-accentGold rounded-full hover:scale-110 shadow-[0_0_15px_rgba(212,175,55,0.4)] disabled:opacity-20 transition-all disabled:hover:scale-100"><i class="fa-solid fa-chevron-right text-sm"></i></button>
        </div>
    </footer>

    <script>
        // --- STREAMING_CHUNK:State & Helpers ---
        let state = { step: 0, hp: 3, xp: 0, studentName: "GUEST_AGENT", mechanics: {} };
        let autoAdvanceTimeout = null;

        const buildSpeakingPrompt = (q, starter) => {
            if(!q) return '';
            return `
                <div class="mt-10 fade-in w-full max-w-2xl mx-auto bg-[#111] border border-[#333] border-l-4 border-l-accentGold p-8 rounded-xl shadow-2xl relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 text-8xl text-bgBase opacity-50"><i class="fa-solid fa-comment-dots"></i></div>
                    <div class="flex items-center gap-3 mb-4">
                        <span class="text-accentGold font-ui font-bold text-[10px] tracking-[0.3em] uppercase bg-accentGold/10 px-3 py-1 rounded">Director Comms</span>
                    </div>
                    <p class="font-epic text-3xl text-textMain mb-4 relative z-10 leading-snug">"${q}"</p>
                    <p class="font-ui text-textMuted text-sm font-bold tracking-widest relative z-10 italic">"${starter}"</p>
                </div>`;
        };

        // --- STREAMING_CHUNK:Lesson Data ---
        const lesson = [
            /* 00 */ { type: 'cover', title: 'THE HOLLYWOOD FIXER', subtitle: 'VIP Talent Management', desc: 'A2 Level. Master Object Pronouns (me, you, him, her, it, us, them) in high-pressure situations.', icon: 'fa-film' },
            /* 01 */ { type: 'idReg', title: 'AGENT LOGIN', desc: 'Enter your credentials to access the VIP database.' },
            
            /* 02 */ { type: 'clientBrief', title: 'YOUR FIRST MISSION', instruction: 'The Agency Director hands you three confidential files. Choose your first client to manage.', 
                       options: [
                           { id: 'diva', label: 'The Diva', desc: 'A famous actress is screaming on set. She lost her script.', icon: 'fa-star' },
                           { id: 'rockstar', label: 'The Rock Star', desc: 'A wild musician is trapped in a restaurant. The paparazzi are outside.', icon: 'fa-guitar' },
                           { id: 'actor', label: 'The Method Actor', desc: 'A serious actor refuses to leave his trailer. He is angry.', icon: 'fa-masks-theater' }
                       ], 
                       followUpQ: 'Why did you choose this client? How will you calm them down?', starter: '"I chose this client because... I will..."' },
                       
            /* 03 */ { type: 'debate', title: 'THE BIG QUESTION', q: 'Would you like to be famous? Is fame a good or a bad thing?', starter: '"I think fame is... because..."' },
            
            /* 04 */ { type: 'matchVocab', title: 'HOLLYWOOD LINGO', pairs: [{w:'Paparazzi', d:'Photographers who follow famous people.'}, {w:'The Set', d:'The place where a movie is filmed.'}, {w:'The Script', d:'The text that actors read and memorize.'}] },
            
            /* 05 */ { type: 'shift', title: 'GRAMMAR PROTOCOL', desc: 'In Hollywood, we must act fast and protect our clients. We don\'t repeat names. We use Object Pronouns (him, her, it, them).', bg: 'immersive-shift' },
            
            /* 06 */ { type: 'lever', title: 'GRAMMAR: HE vs HIM', conceptA: 'Subject (Does the action)', textA: 'HE loves the camera.', conceptB: 'Object (Receives the action)', textB: 'The camera loves HIM.', rule: 'Use Subject Pronouns (He, She, They) BEFORE the verb. Use Object Pronouns (Him, Her, Them) AFTER the verb or preposition.' },
            /* 07 */ { type: 'lever', title: 'GRAMMAR: THEY vs THEM', conceptA: 'Subject', textA: 'THEY are crazy fans.', conceptB: 'Object', textB: 'Do not talk to THEM.', rule: 'They ➔ Them. We ➔ Us. I ➔ Me. (You and It never change).' },

            /* 08 */ { type: 'gossipChat', title: 'CRISIS ALERT 1', sender: 'Director', msg: 'The paparazzi saw Brad and Angelina outside the restaurant! What should we do?', optA: {text: 'Hide they!', ans: false}, optB: {text: 'Hide them!', ans: true}, followUpQ: 'Are the paparazzi following you today?', starter: '"No, they are not following me..."' },
            /* 09 */ { type: 'gossipChat', title: 'CRISIS ALERT 2', sender: 'Lead Actor', msg: 'I lost the script for tomorrow\'s scene! Help!', optA: {text: 'I will find it!', ans: true}, optB: {text: 'I will find him!', ans: false}, followUpQ: 'Did you bring your phone today?', starter: '"Yes, I brought it / No, I didn\'t bring it."' },
            /* 10 */ { type: 'gossipChat', title: 'CRISIS ALERT 3', sender: 'Security', msg: 'Crazy fans are attacking the famous singer, John!', optA: {text: 'Protect he!', ans: false}, optB: {text: 'Protect him!', ans: true}, followUpQ: 'Who protects you when you are in danger?', starter: '"My family/friends protect me."' },

            /* 11 */ { type: 'shift', title: 'THE REDACTOR', desc: 'Amateur agents repeat names. Professional fixers use pronouns to keep messages short. Engage the Script Redactor module.', bg: 'immersive-shift' },
            
            /* 12 */ { type: 'scriptRedactor', title: 'EMAIL CORRECTION 1', 
                       htmlText: 'The director called <span class="redact-target" data-ans="her">Mary</span>. He wants to give the main role to <span class="redact-target" data-ans="her">Mary</span>. But the studio hates <span class="redact-target" data-ans="her">Mary</span>.', 
                       followUpQ: 'Do you like Mary?', starter: '"Yes, I like her / No, I don\'t like her."' },
            
            /* 13 */ { type: 'scriptRedactor', title: 'EMAIL CORRECTION 2', 
                       htmlText: 'The actors are very tired. Bring coffee to <span class="redact-target" data-ans="them">the actors</span> right now. Do not talk to <span class="redact-target" data-ans="them">the actors</span>.', 
                       followUpQ: 'Do you usually talk to actors?', starter: '"No, I never talk to them."' },

            /* 14 */ { type: 'switchboard', title: 'THE SWITCHBOARD', instruction: 'Match the noun to its correct Object Pronoun.',
                       pairs: [{noun: 'The script', pro: 'it'}, {noun: 'The actors', pro: 'them'}, {noun: 'The actress', pro: 'her'}, {noun: 'Me and my team', pro: 'us'}] },

            /* 15 */ { type: 'rapidFire', title: 'REFLEX CHECK', q: 'Which is correct: "Don\'t look at SHE" or "Don\'t look at HER"?', instruction: 'Answer out loud before the timer runs out!' },

            /* 16 */ { type: 'qRoulette', title: 'PAPARAZZI ROULETTE', instruction: 'Spin to answer a question using Object Pronouns.', 
                       questions: ['Do you watch movies on Netflix?', 'Does your mother call you every day?', 'Do you like Brad Pitt?', 'Do you listen to pop music?'] },
            /* 17 */ { type: 'qRoulette', title: 'HOLLYWOOD ROULETTE', instruction: 'Spin for another question.', 
                       questions: ['Did you invite your friends to the party?', 'Can you understand the director?', 'Are you helping your team?', 'Did you send the email to the client?'] },

            /* 18 */ { type: 'pressConference', title: 'AGENT MIC 1', reporter: 'Paparazzi', prompt: 'Tell the paparazzi to stop following the actors (Use THEM).', q: 'Hey! Where are Brad and Angelina? We want to take a picture of Brad and Angelina!' },
            /* 19 */ { type: 'pressConference', title: 'AGENT MIC 2', reporter: 'The Diva Actress', prompt: 'Tell the actress you sent the script to her (Use IT and HER).', q: 'Where is my script?! I need the script right now!' },

            /* 20 */ { type: 'crossroads', title: 'THE HOLLYWOOD DILEMMA', dilemma: 'A magazine offers you $100,000 to sell an embarrassing photo of your client. Do you sell IT to THEM, or do you delete IT?', opt1: 'Sell it to them', opt2: 'Delete it' },

            /* 21 */ { type: 'debate', title: 'DEEP THOUGHT: PRIVACY', q: 'Do famous people deserve privacy, or is losing privacy the price of fame?', starter: '"I think they deserve/don\'t deserve privacy because..."' },
            /* 22 */ { type: 'debate', title: 'DEEP THOUGHT: CANCEL CULTURE', q: 'When a celebrity makes a mistake, the internet "cancels" them. Is cancel culture fair to them?', starter: '"I believe cancel culture is/isn\'t fair to them because..."' },
            /* 23 */ { type: 'homework', title: 'CRISIS AVERTED', desc: 'The agency is safe. Download the Agent App to practice your Object Pronouns.', appName: 'Fixer Syntax App' },
            /* 24 */ { type: 'curtain', title: 'STAR AGENT', desc: 'You mastered Object Pronouns (him, her, it, us, them) and saved Hollywood!' }
        ];

        // --- STREAMING_CHUNK:Core Functions ---
        function initializeSystem() { document.getElementById('loading-screen').classList.add('fade-out'); loadNotes(); render(); }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {});
                document.getElementById('fs-icon').classList.replace('fa-expand', 'fa-compress');
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    document.getElementById('fs-icon').classList.replace('fa-compress', 'fa-expand');
                }
            }
        }

        function updateHUD() {
            for(let i=1; i<=3; i++) {
                const heart = document.getElementById(`hp-${i}`);
                heart.style.opacity = (i <= state.hp) ? "1" : "0.2";
            }
            document.getElementById('hud-name').innerText = state.studentName;
            document.getElementById('xp-counter').innerText = String(state.xp).padStart(4, '0');
            
            const total = lesson.length;
            document.getElementById('page-counter').innerText = `PAGE ${String(state.step + 1).padStart(2, '0')} / ${total}`;
            document.getElementById('progress-fill').style.width = `${((state.step + 1) / total) * 100}%`;
            
            document.getElementById('btn-prev').disabled = state.step === 0;
            // Bug Fix: Remove hard-locks on btn-next to prevent users getting stuck.
            document.getElementById('btn-next').disabled = state.step === total - 1;
            
            if(lesson[state.step].bg === 'immersive-shift') document.body.classList.add('immersive-shift');
            else document.body.classList.remove('immersive-shift');
        }

        function nav(dir) { 
            if(autoAdvanceTimeout) { clearTimeout(autoAdvanceTimeout); autoAdvanceTimeout = null; }
            let n = state.step + dir; 
            if(n >= 0 && n < lesson.length) { 
                closeRedact(); // safety
                state.step = n; 
                render(); 
            } 
        }

        function takeDamage() {
            if(state.hp > 0) state.hp--;
            const overlay = document.getElementById('damage-overlay');
            overlay.classList.replace('opacity-0', 'opacity-100');
            document.getElementById('arena').classList.add('damage-shake');
            updateHUD();
            setTimeout(() => { overlay.classList.replace('opacity-100', 'opacity-0'); document.getElementById('arena').classList.remove('damage-shake'); }, 400);
        }

        function triggerPraise(mainText = 'BRILLIANT!', subText = 'CRISIS AVERTED') {
            const overlay = document.getElementById('praise-overlay');
            const card = document.getElementById('praise-card');
            document.getElementById('praise-text').innerText = mainText; document.getElementById('praise-sub').innerText = subText;
            state.xp += 100; updateHUD();
            
            overlay.classList.remove('opacity-0', 'pointer-events-none');

                b.querySelector('i').classList.add('text-textMuted');

        }

        let selectedPill = null;
        function selectVocab(el) {
            if(selectedPill) selectedPill.classList.remove('border-accentGold', 'text-accentGold');
            selectedPill = el;
            el.classList.add('border-accentGold', 'text-accentGold');
        }
        function dropVocab(slot, correctWord) {
            if(!selectedPill) return;
            if(selectedPill.getAttribute('data-word') === correctWord) {
                slot.innerHTML = `<span class="font-epic text-2xl text-accentGold tracking-widest uppercase">${correctWord}</span>`;
                slot.classList.replace('border-dashed', 'border-solid');
                slot.classList.replace('border-[#555]', 'border-accentGold');
                slot.classList.replace('bg-[#050505]', 'bg-accentGold/10');
                selectedPill.style.display = 'none';
                selectedPill = null;
                const total = document.querySelectorAll('.vocab-drop').length;
                const done = document.querySelectorAll('.vocab-drop.border-accentGold').length;
                if(total === done) triggerPraise('MAPPED!', 'LINGO ACQUIRED');
            } else {
                takeDamage();
            }
        }

        function toggleLever() {
            const track = document.getElementById('grammar-lever');
            state.mechanics.leverState = !state.mechanics.leverState;
            const [ca, ta, cb, tb] = ['lvr-c-a', 'lvr-t-a', 'lvr-c-b', 'lvr-t-b'].map(id => document.getElementById(id));
            if(state.mechanics.leverState) {
                track.classList.add('toggled');
                ca.classList.add('opacity-30'); ta.classList.add('opacity-30');
                cb.classList.remove('opacity-30'); tb.classList.remove('opacity-30');
            } else {
                track.classList.remove('toggled');
                ca.classList.remove('opacity-30'); ta.classList.remove('opacity-30');
                cb.classList.add('opacity-30'); tb.classList.add('opacity-30');
            }
        }

        // Gossip Chat Logic
        function answerGossip(btn, isCorrect, text) {
            const opts = document.getElementById('chat-options');
            const history = document.getElementById('chat-history');
            opts.style.display = 'none';
            
            const bubble = document.createElement('div');
            bubble.className = "chat-bubble-right text-sm fade-in";
            bubble.innerText = text;
            history.appendChild(bubble);
            history.scrollTop = history.scrollHeight;

            if(isCorrect) {
                triggerPraise('SENT!', 'CRISIS MANAGED');
                const fu = document.getElementById('follow-up-box');
                if(fu) fu.classList.remove('hidden');
                else autoAdvanceTimeout = setTimeout(() => nav(1), 2000);
            } else {
                takeDamage();
                setTimeout(() => { bubble.remove(); opts.style.display = 'flex'; }, 1500);
            }
        }

        // Script Redactor Logic
        let currentRedact = null;
        function openRedact(el) {
            currentRedact = el;
            const menu = document.getElementById('pronoun-menu');
            const rect = el.getBoundingClientRect();
            menu.style.display = 'grid';
            menu.style.top = (rect.bottom + window.scrollY + 10) + 'px';
            menu.style.left = (rect.left + window.scrollX - 40) + 'px';
        }
        function closeRedact() { document.getElementById('pronoun-menu').style.display = 'none'; currentRedact = null; }
        function selectRedact(pronoun) {
            if(!currentRedact) return;
            if(pronoun === currentRedact.getAttribute('data-ans')) {
                currentRedact.innerText = pronoun;
                currentRedact.classList.add('solved');
                triggerPraise('CENSORED!', 'GOOD CHOICE');
                closeRedact();
                checkRedactCompletion();
            } else {
                takeDamage();
                closeRedact();
            }
        }
        function checkRedactCompletion() {
            const targets = document.querySelectorAll('.redact-target');
            const solved = document.querySelectorAll('.redact-target.solved');
            if(targets.length > 0 && targets.length === solved.length) {
                document.getElementById('verify-btn').classList.remove('opacity-50', 'pointer-events-none');
                document.getElementById('verify-btn').classList.add('glow-gold');
                const fu = document.getElementById('decoder-followup');
                if(fu) fu.classList.remove('hidden');
            }
        }

        // Switchboard Logic
        let swLeftSelected = null;
        function selectSwLeft(btn) {
            if(swLeftSelected) swLeftSelected.classList.remove('border-accentGold', 'bg-accentGold/20');
            swLeftSelected = btn;
            btn.classList.add('border-accentGold', 'bg-accentGold/20');
        }
        function selectSwRight(btn) {
            if(!swLeftSelected) return;
            if(swLeftSelected.getAttribute('data-match') === btn.getAttribute('data-pro')) {
                swLeftSelected.classList.replace('border-accentGold', 'border-accentGreen');
                swLeftSelected.classList.replace('bg-accentGold/20', 'bg-accentGreen/10');
                swLeftSelected.classList.add('text-accentGreen');
                swLeftSelected.style.pointerEvents = 'none';
                
                btn.classList.replace('border-[#333]', 'border-accentGreen');
                btn.classList.replace('bg-panelDark', 'bg-accentGreen/10');
                btn.classList.add('text-accentGreen');
                btn.style.pointerEvents = 'none';
                
                swLeftSelected = null;
                
                const leftBtns = document.querySelectorAll('.sw-l-btn');
                const solved = document.querySelectorAll('.sw-l-btn.border-accentGreen');
                if(leftBtns.length === solved.length) {
                    triggerPraise('CONNECTED!', 'SWITCHBOARD ALIGNED');
                    autoAdvanceTimeout = setTimeout(() => nav(1), 1500);
                }
            } else {
                takeDamage();
                swLeftSelected.classList.remove('border-accentGold', 'bg-accentGold/20');
                swLeftSelected = null;
            }
        }

        function answerLiveStream(btn) {
            triggerPraise('CORRECT!', 'FAST REFLEXES');
            autoAdvanceTimeout = setTimeout(() => nav(1), 1500);
        }

        let rouletteSpinning = false;
        function spinRoulette(stepIndex) {
            if(rouletteSpinning) return;
            rouletteSpinning = true;
            const textEl = document.getElementById('roulette-text'); const btn = document.getElementById('spin-btn'); const fu = document.getElementById('roulette-followup');
            const qList = lesson[stepIndex].questions;
            btn.classList.add('opacity-50', 'pointer-events-none'); fu.classList.add('hidden'); textEl.classList.remove('text-accentGold');
            let spins = 0; const maxSpins = 20;
            const interval = setInterval(() => {
                textEl.innerText = qList[Math.floor(Math.random() * qList.length)]; spins++;
                if(spins >= maxSpins) {
                    clearInterval(interval);
                    textEl.innerText = `"${qList[Math.floor(Math.random() * qList.length)]}"`; textEl.classList.add('text-accentGold');
                    btn.innerText = "I ANSWERED"; btn.classList.remove('opacity-50', 'pointer-events-none');
                    btn.onclick = () => { fu.classList.remove('hidden'); btn.classList.add('hidden'); triggerPraise('ANALYSIS LOGGED!', 'GOOD WORK'); };
                    rouletteSpinning = false;
                }
            }, 80);
        }

        function togglePressMic() {
            const btn = document.getElementById('mic-btn'); 
            const icon = document.getElementById('mic-icon'); 
            const status = document.getElementById('mic-status');
            
            if(btn.classList.contains('recording')) {
                btn.classList.remove('recording', 'border-accentRed'); 
                btn.classList.add('border-accentGold');
                icon.classList.replace('fa-stop', 'fa-check'); icon.classList.replace('text-accentRed', 'text-accentGold');
                status.innerText = "RESPONSE SECURED"; status.classList.replace('text-accentRed', 'text-accentGold');
                triggerPraise('STRONG PR!', 'MEDIA SATISFIED');
            } else if(!btn.classList.contains('border-accentGold')) {
                btn.classList.add('recording', 'border-accentRed'); btn.classList.remove('border-[#333]');
                icon.classList.replace('fa-microphone', 'fa-stop'); icon.classList.replace('text-textMuted', 'text-accentRed');
                status.innerText = "RECORDING... TAP TO STOP"; status.classList.replace('text-textMuted', 'text-accentRed');
            }
        }

        // --- STREAMING_CHUNK:Confetti Engine ---
        function shootConfetti() {
            const cCanvas = document.createElement('canvas'); cCanvas.style.position = 'fixed'; cCanvas.style.inset = 0; cCanvas.style.pointerEvents = 'none'; cCanvas.style.zIndex = 9999; document.body.appendChild(cCanvas);
            const cCtx = cCanvas.getContext('2d'); cCanvas.width = window.innerWidth; cCanvas.height = window.innerHeight;
            const pieces = []; const colors = ['#D4AF37', '#E50914', '#FFFFFF'];
            for(let i=0; i<60; i++) pieces.push({ x: cCanvas.width/2, y: cCanvas.height/2+100, vx: (Math.random()-0.5)*20, vy: (Math.random()-1)*20-5, size: Math.random()*10+5, color: colors[Math.floor(Math.random()*colors.length)], rot: Math.random()*360, rotSpeed: (Math.random()-0.5)*10 });
            function animateC() {
                cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height); let active = false;
                pieces.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.5; p.rot += p.rotSpeed; if(p.y < cCanvas.height) active = true; cCtx.save(); cCtx.translate(p.x, p.y); cCtx.rotate(p.rot*Math.PI/180); cCtx.fillStyle = p.color; cCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size); cCtx.restore(); });
                if(active) requestAnimationFrame(animateC); else document.body.removeChild(cCanvas);
            }
            animateC();
        }

        window.onload = () => { updateHUD(); };
    </script>
</body>
